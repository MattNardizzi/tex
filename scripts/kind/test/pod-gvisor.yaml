# gVisor RUNTIME proof pod.
#
# Proves the `gvisor` RuntimeClass shipped by the chart (handler: runsc)
# resolves to a REAL gVisor sandbox on the kind node: under gVisor /proc/version
# reports a "gvisor" kernel, which kind-test asserts.
#
# It opts OUT of Tex injection (tex.systems/govern-exclude=true) on purpose, so
# this pod isolates the RUNTIME question from the injected egress-redirect init.
# (The injected tex-init runs an iptables `-m owner` REDIRECT that gVisor's
# userspace netstack does not implement — a real, documented interaction; see
# the harness report. Decoupling keeps the runtime proof clean.) An opted-out
# pod is silent to the VAP, so it admits without needing the injected annotation.
apiVersion: v1
kind: Pod
metadata:
  name: gvisor-runtime-proof
  namespace: agents
  labels:
    tex.systems/govern-exclude: "true"
spec:
  runtimeClassName: gvisor
  restartPolicy: Never
  containers:
    - name: app
      image: busybox:1.36
      command: ["/bin/sh", "-c"]
      args:
        - 'echo "kernel: $(cat /proc/version)"; sleep 3600'
