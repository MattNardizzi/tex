# render.yaml — Tex sandbox "practice course" driver.
#
# Defines the long-running action driver that turns the synthetic Meridian
# estate into a living enterprise. It is a Render Background Worker that drives
# ~1 agent action/second through Tex's LIVE enforcement path
# (POST /v1/govern/decide) for two days, so every PERMIT / FORBID / ABSTAIN is
# sealed with a hash-chained evidence record and every ABSTAIN surfaces as a
# held card on the interface.
#
# Behaviour that makes it faithful:
#   * It WAITS for the operator to press "Yes" on the interface before it does
#     anything (--wait-for-ignition). It never self-ignites, so the day-one
#     door is never stolen.
#   * Its steady traffic keeps the web service awake (protecting the in-memory
#     inventory) and survives your laptop being closed.
#   * If the web service restarts mid-run (redeploy / sleep) and its in-memory
#     state resets, the driver detects the un-ignited tenant at the next
#     heartbeat and re-asserts ignition + re-onboards, then carries on.
#
# ── The WEB service is assumed to already exist. ───────────────────────────
# REAL-ONLY MODE (2026-06): the production web service governs REAL discovered
# estates only. On it (Dashboard → your web service → Environment), confirm:
#
#     TEX_APP_ENV=production      # forces the synthetic-estate seeding OFF
#     TEX_SANDBOX                 # MUST be UNSET (do NOT set it to 1)
#
# Do NOT set TEX_SANDBOX / TEX_SANDBOX_TENANT / TEX_SANDBOX_SEED on the web
# service: they drive the invented meridian-7 demo estate and would surface
# synthetic agents as if they were real on the live site. The synthetic
# practice-course lives ONLY in the SUSPENDED worker below, for use in a
# non-production environment.
#
# ── Add the worker ─────────────────────────────────────────────────────────
# Either deploy this blueprint (Dashboard → New → Blueprint) or create it by
# hand (New → Background Worker) with the build/start commands below. A worker
# requires a paid plan; "starter" is the cheapest always-on tier.
#
# Note: if your Render account rejects `runtime:`, use `env: python` instead —
# the two are the same field under different spec versions.

services:
  # ── The WEB service (the PDP) ───────────────────────────────────────────────
  # Built from the repo Dockerfile (single-process, single-worker, non-root).
  # numInstances is 1 and the service carries a persistent disk, which Render
  # pins to a single instance anyway — and that matches Tex's single-writer
  # evidence-chain posture exactly (see deploy/DURABILITY.md). Do NOT scale this
  # past 1 without a single-writer evidence service; two instances fork the
  # hash-chained evidence log.
  #
  # Note: if your Render account rejects `runtime:`, use `env: docker` instead.
  - type: web
    name: tex-web
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: starter
    region: oregon
    branch: main
    autoDeploy: true
    numInstances: 1
    healthCheckPath: /health
    # Durable home for the evidence-chain JSONL (var/tex/evidence) AND the
    # evidence-seal signing key (var/tex/keys). WORKDIR is /app, so mount the
    # parent. A Render disk forces a single instance — the single writer.
    disk:
      name: tex-state
      mountPath: /app/var/tex
      sizeGB: 10
    envVars:
      # The app reads TEX_APP_ENV (NOT TEX_ENV). production turns on fail-closed
      # startup guards, which then REQUIRE the secret + keys below.
      - key: TEX_APP_ENV
        value: production
      # Postgres write-through for all durable shared state. Without it the PDP
      # runs in-memory and a restart erases everything.
      - key: DATABASE_URL
        fromDatabase:
          name: tex-postgres
          property: connectionString
      # HMAC signing key for evidence-bundle manifests. Required in a
      # production-like env or create_app() raises at startup. Render generates a
      # high-entropy value and keeps it stable across deploys.
      - key: TEX_EVIDENCE_SUMMARY_SECRET
        generateValue: true
      # API keys (<key>[:<tenant>[:<scopes>]], comma-separated). WITHOUT this,
      # every authenticated route fails closed with 401. Set it in the dashboard
      # (sync:false keeps the secret out of this file).
      - key: TEX_API_KEYS
        sync: false
      # PRESENCE: the grounded brain proposes which claims the truth-gate should
      # verify. The gate recomputes + re-authors every answer, so the model is
      # NEVER load-bearing for truth — honesty is identical on any model. Sonnet
      # routes ambiguous questions better than Haiku (fewer needless abstentions);
      # flip to claude-haiku-4-5 to cut cost once traffic scales.
      - key: TEX_PRESENCE_BRAIN
        value: claude
      - key: TEX_PRESENCE_MODEL
        value: claude-sonnet-4-6
      # Claude key for the presence brain. SECRET — set it in the dashboard
      # (sync:false keeps it out of this public file). Until it is set, the brain
      # stays safely OFF (fail-safe) and the voice path is byte-identical.
      - key: ANTHROPIC_API_KEY
        sync: false
      # ASK-ANYTHING PLANNER (ON). The brain compiles each question into a typed plan over the
      # read-tools; the gate executes it and authors every spoken word from the recomputed
      # truth, or honestly abstains — never confidently wrong, no canned answers. A model
      # outage (no credits / rate-limit) degrades to the deterministic path, so /v1/ask never
      # goes dark. Set TEX_PRESENCE_PLANNER=0 to disable. Runs on Opus (the verified
      # plan-compile model); the legacy brain above stays on Sonnet.
      - key: TEX_PRESENCE_PLANNER
        value: "1"
      - key: TEX_PRESENCE_PLANNER_MODEL
        value: claude-opus-4-8

  # ⚠ DEACTIVATED — REAL-ONLY MODE (2026-06). This worker drives the SYNTHETIC
  # meridian-7 demo estate (~1 invented agent-action/sec). It must NOT run in
  # production. Keep it SUSPENDED in the Render dashboard (the service →
  # Settings → Suspend). The definition is kept (not deleted) so the
  # practice-course can be revived in a non-production environment.
  - type: worker
    name: tex-sim-driver
    runtime: python
    plan: starter
    region: oregon            # match your web service's region for low-latency hops
    branch: main
    autoDeploy: false
    buildCommand: pip install -r requirements.txt
    # There is no package install (src layout, no pyproject), so the web and
    # the worker both run with src on the path. Mirror whatever the web start
    # command does; PYTHONPATH=src is the simplest.
    startCommand: >
      PYTHONPATH=src python -m tex.sim live reference
      --wait-for-ignition
      --drive govern
      --rate 1
      --onboard standard
      --duration 2d
      --heartbeat 60
      --base-url $TEX_BASE_URL
    envVars:
      - key: TEX_BASE_URL
        value: https://tex-uh4j.onrender.com

# Managed Postgres backing the web service's write-through stores. DATABASE_URL
# is injected into tex-web via fromDatabase above. Schema is bootstrapped
# idempotently by the stores on boot (no manual migration step).
databases:
  - name: tex-postgres
    plan: starter
    region: oregon
