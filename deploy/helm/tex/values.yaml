# One install brings up the whole stack. Label a namespace
# tex.systems/govern=enabled and every pod in it is governed automatically.

namespace: tex-system

image:
  pdp: ghcr.io/vortexblack/tex:latest
  proxy: ghcr.io/vortexblack/tex:latest
  init: ghcr.io/vortexblack/tex-init:latest
  kernelPep: ghcr.io/vortexblack/tex-kernel-pep:latest
  pullPolicy: IfNotPresent

pdp:
  # 1 ON PURPOSE — single-writer evidence hash-chain + process-local caches.
  # Do NOT raise without a single-writer evidence service (see README "Durability").
  replicas: 1
  port: 8080
  # Set to enable the 24/7 standing watch that seals newly discovered agents.
  scanIntervalSeconds: 3600
  # The app reads TEX_APP_ENV (NOT TEX_ENV). A production-like value turns on
  # fail-closed startup guards AND requires evidenceSummarySecret + apiKeys below.
  appEnv: production

  # ── Durability ────────────────────────────────────────────────────────────
  # Postgres write-through for all durable SHARED state (decisions, policies,
  # evidence mirror, agent registry, discovery ledger, ...). Without it the PDP
  # runs pure in-memory and a restart erases everything. Stored in a Secret.
  databaseUrl: ""              # postgres://user:pass@host:5432/tex

  # The evidence hash-chain JSONL AND the evidence-seal signing key ride this
  # per-instance volume so both survive pod restarts. The mount is the PARENT
  # var/tex dir (image WORKDIR=/app) so it covers BOTH var/tex/evidence (chain)
  # and var/tex/keys (signing key — regenerated if lost, which would break
  # signature-authorship continuity across restarts).
  persistence:
    enabled: true
    size: 5Gi
    storageClass: ""           # "" = cluster default
    mountPath: /app/var/tex

  # ── Required when appEnv is production-like (else the app fails closed) ──────
  evidenceSummarySecret: ""    # high-entropy >=32B; HMAC key for evidence signing
  apiKeys: ""                  # TEX_API_KEYS; without it every authed route → 401

  # Prometheus scrape annotations for the live /metrics endpoint.
  metrics:
    enabled: true
    path: /metrics

  resources: {}

operator:
  enabled: true
  port: 8443
  # cert-manager is the prerequisite for the webhook's serving cert.
  certManager: true
  # Self-bootstrap the official `kubernetes` python client at operator startup
  # (into a writable dir, prepended to PYTHONPATH) so the EnrollmentController's
  # namespace watch can run on an image that does not bake the client in.
  # DEFAULT OFF: production should bake the client into the image; this is the
  # no-image-rebuild path the local kind harness (scripts/kind/) turns ON. It
  # adds a one-time pip install at pod start and needs egress to PyPI.
  installKubernetesClient: false

# Per-pod auto-injection via the mutating webhook (portable, no node privilege).
sidecarInjection:
  enabled: true
  proxyPort: 8088

# Born-in-a-box admission: the DENY half. The injector above brings compliant
# pods INTO the box; admission REFUSES governed-namespace pods that cannot be —
# no approved sandbox runtimeClass, not injected, a host escape, or a privileged
# container (incl. ephemeral debug). HONEST SCOPE: this denies non-compliant pods
# that flow THROUGH THE API SERVER. It does NOT stop static pods, direct CRI, or a
# compromised kubelet (the eBPF node floor redirects their egress; the genuine
# node-root — DICE/TPM measured boot + node attestation — is research, not shipped).
# So this is "non-compliant agents cannot be SCHEDULED via the apiserver", not an
# inescapable box. Off until you label a namespace tex.systems/govern=enabled.
admission:
  # The ValidatingAdmissionPolicy (CEL, in-apiserver, GA k8s 1.30). DEFAULT ON:
  # it is fail-closed and has NO external dependency — unlike a webhook it cannot
  # be "down". It only acts on namespaces labeled tex.systems/govern=enabled, so
  # a fresh install touches nothing until you opt a namespace in.
  validatingPolicy:
    enabled: true
  # The validating WEBHOOK (operator code path, /validate). DEFAULT OFF: it is
  # the extensible twin (where future signature/lookup checks live) but couples
  # admission to operator uptime (failurePolicy: Fail => operator down blocks
  # governed pods). Enable only if you need logic the CEL policy cannot express.
  webhook:
    enabled: false
  # Render node.k8s.io/v1 RuntimeClass objects (runtimeclass.yaml) for the
  # approved sandbox runtimes, so a compliant pod's runtimeClassName resolves to
  # a real handler on the node. DEFAULT OFF: it requires the matching containerd
  # runtime to actually exist on every node (e.g. gVisor's runsc shim) — shipping
  # a RuntimeClass whose handler has no runtime would make those pods
  # un-schedulable. Turn ON only where the runtime is provisioned (the kind
  # harness installs gVisor/runsc on its node; see scripts/kind/). Only the
  # "gvisor" entry renders an object (handler: runsc); kata* stays allowlist-only.
  shipRuntimeClass: false
  # Sandbox RuntimeClass handles a governed pod may declare to be "in the box".
  # Keep in lock-step with TEX_APPROVED_RUNTIME_CLASSES on the operator and with
  # operator/webhook.py:InjectorConfig.approved_runtime_classes. The ISOLATION
  # STRENGTH is RUNTIME-DEPENDENT on which runtime actually runs.
  approvedRuntimeClasses:
    - gvisor
    - kata
    - kata-qemu
    - kata-clh
    - kata-fc
    - kata-cc

# cosign signed-image gating, scoped to governed namespaces. DEFAULT OFF: with
# no trusted identity set this would (correctly) deny EVERY image and brick
# governed namespaces — supply your Tex-trusted signing identity, then enable.
#
# HONESTY: this is a NEW integration with the sigstore admission stack. Tex's
# existing src/tex/c2pa/cosign_verifier.py verifies cosign signatures over C2PA
# *evidence assertions*, NOT OCI image signatures — it does NOT do image gating.
# Signing proves PROVENANCE (who built the image), never BEHAVIOR: a signed
# image can still be a malicious agent. Necessary, not sufficient.
imagePolicy:
  enabled: false
  engine: kyverno        # "kyverno" (ClusterPolicy verifyImages) | "sigstore" (ClusterImagePolicy)
  # Keyless (Fulcio/OIDC) trusted identity — preferred over a static key.
  keyless:
    issuer: ""           # e.g. https://token.actions.githubusercontent.com
    subject: ""          # e.g. https://github.com/vortexblack/tex/.github/workflows/release.yaml@refs/tags/v*
    rekorUrl: https://rekor.sigstore.dev
  # OR a static cosign public key (PEM, multi-line). If set, takes precedence.
  publicKey: ""

# Sidecarless kernel floor (eBPF DaemonSet). The most automatic per-pod
# coverage; requires privileged nodes. Enable in clusters where you control
# the node security posture. ALSO the born-in-a-box apiserver-bypass floor:
# it redirects egress regardless of how a workload was placed (static pod,
# direct CRI, compromised kubelet), so admission-bypass traffic still hits the
# PEP. Run it alongside `admission` for defense-in-depth.
kernelFloor:
  enabled: false
  proxyPort: 8088
  # Governed cgroup root the eBPF programs attach under. The cgroup root governs
  # the whole node; attach under specific workload cgroups to narrow scope.
  cgroup: "/sys/fs/cgroup"

# Optional bearer key the PEPs present to the PDP. Created as a Secret when set.
apiKey: ""
