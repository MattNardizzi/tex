{{- if .Values.operator.enabled }}
# The operator: enrollment controller (namespace watch) + mutating webhook.
apiVersion: apps/v1
kind: Deployment
metadata: { name: tex-operator, namespace: {{ include "tex.namespace" . }} }
spec:
  replicas: 1
  selector: { matchLabels: { app: tex-operator } }
  template:
    metadata: { labels: { app: tex-operator } }
    spec:
      # Same reason as the PDP: avoid the legacy TEX_PORT=tcp://... service-link
      # env (the `tex` Service) poisoning the operator's config parsing.
      enableServiceLinks: false
      serviceAccountName: tex-operator
      containers:
        - name: operator
          image: {{ .Values.image.pdp }}
          {{- if .Values.operator.installKubernetesClient }}
          # The EnrollmentController's namespace list-then-watch needs the
          # official `kubernetes` client (controller.py imports it lazily and
          # raises if absent). The base image ships only the app's runtime deps,
          # so when this flag is on the operator self-bootstraps the client into
          # a writable dir (the venv is root-owned; the pod runs as uid 10001)
          # and prepends it to PYTHONPATH before launching. DEFAULT OFF: bake the
          # client into the image for production; this is the no-image-rebuild
          # path the kind harness uses. Honest cost: a one-time pip install at
          # pod start (needs egress to PyPI).
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              TARGET=/tmp/operator-libs
              python -c 'import kubernetes' 2>/dev/null \
                || pip install --no-cache-dir --target="$TARGET" kubernetes
              export PYTHONPATH="$TARGET:${PYTHONPATH}"
              exec python -m tex.operator
          {{- else }}
          command: ["python", "-m", "tex.operator"]
          {{- end }}
          env:
            - { name: TEX_PDP_BASE, value: "http://tex.{{ include "tex.namespace" . }}.svc.cluster.local:{{ .Values.pdp.port }}" }
            - { name: TEX_PROXY_IMAGE, value: {{ .Values.image.proxy | quote }} }
            - { name: TEX_INIT_IMAGE, value: {{ .Values.image.init | quote }} }
            - { name: TEX_PROXY_PORT, value: "{{ .Values.sidecarInjection.proxyPort }}" }
            - { name: TEX_OPERATOR_PORT, value: "{{ .Values.operator.port }}" }
            - { name: TEX_WEBHOOK_CERT, value: "/tls/tls.crt" }
            - { name: TEX_WEBHOOK_KEY, value: "/tls/tls.key" }
          ports: [ { containerPort: {{ .Values.operator.port }}, name: webhook } ]
          volumeMounts: [ { name: tls, mountPath: /tls, readOnly: true } ]
      volumes:
        - { name: tls, secret: { secretName: tex-operator-tls, optional: true } }
---
apiVersion: v1
kind: Service
metadata: { name: tex-operator, namespace: {{ include "tex.namespace" . }} }
spec:
  selector: { app: tex-operator }
  ports: [ { port: 443, targetPort: webhook, name: webhook } ]
{{- end }}
