apiVersion: v1
kind: ConfigMap
metadata:
  name: tex-pep-config
  namespace: tex-system
data:
  # The governed cgroup root. Attach under specific workload cgroups to scope
  # governance to chosen namespaces/pods; the cgroup root governs the node.
  cgroup: "/sys/fs/cgroup"
  # The PDP (Tex) service the proxy and agent call.
  pdpBase: "http://tex.tex-system.svc.cluster.local:8080"
