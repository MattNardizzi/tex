{{- if and .Values.operator.enabled .Values.sidecarInjection.enabled }}
# Auto-inject the PEP into every new pod in a governed namespace. The API
# server calls the operator's /mutate before persisting the pod. Scoped by the
# namespaceSelector to namespaces labeled tex.systems/govern=enabled, so the
# webhook only fires where governance is turned on.
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: tex-sidecar-injector
  {{- if .Values.operator.certManager }}
  annotations: { cert-manager.io/inject-ca-from: "{{ include "tex.namespace" . }}/tex-operator-tls" }
  {{- end }}
webhooks:
  - name: inject.tex.systems
    admissionReviewVersions: ["v1"]
    sideEffects: None
    failurePolicy: Ignore   # never block pod creation if the injector is down
    namespaceSelector:
      matchLabels: { tex.systems/govern: enabled }
    rules:
      - operations: ["CREATE"]
        apiGroups: [""]
        apiVersions: ["v1"]
        resources: ["pods"]
    clientConfig:
      service:
        name: tex-operator
        namespace: {{ include "tex.namespace" . }}
        path: /mutate
        port: 443
{{- end }}
{{- if and .Values.operator.enabled .Values.admission.webhook.enabled }}
---
# Born-in-a-box DENY half, the OPTIONAL code path: the validating webhook twin
# of the injector. The ValidatingAdmissionPolicy (validating-policy.yaml) is the
# preferred, dependency-free floor; this webhook exists for deny logic the CEL
# policy cannot express (future signature/Rekor lookups). failurePolicy: Fail =>
# fail-closed: if the operator is down, governed-namespace pods do NOT admit.
# The opt-out (tex.systems/govern-exclude) is honored in code (should_validate).
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: tex-admission-validator
  {{- if .Values.operator.certManager }}
  annotations: { cert-manager.io/inject-ca-from: "{{ include "tex.namespace" . }}/tex-operator-tls" }
  {{- end }}
webhooks:
  - name: validate.tex.systems
    admissionReviewVersions: ["v1"]
    sideEffects: None
    failurePolicy: Fail        # deny-half MUST fail closed
    timeoutSeconds: 5
    namespaceSelector:
      matchLabels: { tex.systems/govern: enabled }
    rules:
      - operations: ["CREATE"]
        apiGroups: [""]
        apiVersions: ["v1"]
        resources: ["pods"]
    clientConfig:
      service:
        name: tex-operator
        namespace: {{ include "tex.namespace" . }}
        path: /validate
        port: 443
{{- end }}
{{- if and .Values.operator.enabled .Values.operator.certManager }}
---
# Self-signed serving cert for the webhook (cert-manager).
apiVersion: cert-manager.io/v1
kind: Issuer
metadata: { name: tex-selfsigned, namespace: {{ include "tex.namespace" . }} }
spec: { selfSigned: {} }
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata: { name: tex-operator-tls, namespace: {{ include "tex.namespace" . }} }
spec:
  secretName: tex-operator-tls
  issuerRef: { name: tex-selfsigned, kind: Issuer }
  dnsNames:
    - tex-operator.{{ include "tex.namespace" . }}.svc
    - tex-operator.{{ include "tex.namespace" . }}.svc.cluster.local
{{- end }}
