# COMPLIANT pod: declares the approved gVisor sandbox runtimeClassName.
#
# In the governed `agents` namespace the admission chain runs:
#   1. the MUTATING injector adds tex.systems/injected=true (+ the PEP sidecar
#      and egress-redirect init) — proving the injector ran;
#   2. the ValidatingAdmissionPolicy then ADMITS it: an approved sandbox
#      runtimeClass + the injected annotation + no host escape + no privileged
#      container = all four validations pass.
# The pod then SCHEDULES onto the node and runs under the gVisor `runsc` handler
# (RuntimeClass gvisor -> handler runsc, registered in containerd by
# kind-config.yaml and backed by the runsc binary baked into the node image).
#
# The container greps /proc/version: under gVisor the kernel identifies itself
# as "gVisor", which is how kind-test PROVES the pod really ran sandboxed rather
# than under the default runc.
apiVersion: v1
kind: Pod
metadata:
  name: good-agent
  namespace: agents
spec:
  runtimeClassName: gvisor
  restartPolicy: Never
  containers:
    - name: app
      image: busybox:1.36
      command: ["/bin/sh", "-c"]
      args:
        - 'echo "kernel: $(cat /proc/version)"; sleep 3600'
