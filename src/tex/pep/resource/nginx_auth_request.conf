# B3 — nginx auth_request reference for the Tex demand-side PEP.
#
# This is a REFERENCE recipe, not a deployed artifact. It fronts a downstream
# resource with nginx and gates every request on a Tex TG-PCC, using nginx's
# ngx_http_auth_request_module. The subrequest hits a tiny ASGI verifier
# (tex.pep.resource.middleware.asgi_auth_request_app) that returns 204 (PERMIT)
# or 401/403 (DENY). nginx forwards the original method/path + the demand
# headers so the verifier can recompute the intent-bind from the real call.
#
# HONESTY: this makes the resource DEMAND a TG-PCC ONLY for traffic that
# traverses THIS nginx. A path that bypasses nginx (a raw API key, an alternate
# port, a direct socket to the upstream) is NOT covered — the non-bypassable
# property is POSITIONAL-ONLY. Pin the upstream to listen on loopback only and
# route ALL ingress through this nginx to make the position real.
#
# Run the verifier sidecar (example, uvicorn):
#   python -c "from tex.pep.resource.middleware import asgi_auth_request_app; \
#     import tex.pep.resource.jwks_loader as j; app=asgi_auth_request_app(j.PINNED)"
# (in practice you wire asgi_auth_request_app(pinned_jwks) into your ASGI server
#  and serve it on 127.0.0.1:8731 — see the package README.)

upstream tex_verify {
    server 127.0.0.1:8731;   # the asgi_auth_request_app verifier sidecar
}

upstream protected_resource {
    server 127.0.0.1:9000;   # the real resource — MUST listen on loopback only
}

server {
    listen 443 ssl;
    server_name resource.internal;

    # --- the demand gate -------------------------------------------------- #
    location = /_tex_auth {
        internal;                                   # never reachable directly
        proxy_pass              http://tex_verify;
        proxy_pass_request_body off;                # the verifier needs no body
        proxy_set_header        Content-Length "";
        # Forward the ORIGINAL call so the verifier recomputes the intent-bind.
        proxy_set_header        X-Original-Method $request_method;
        proxy_set_header        X-Original-URI    $request_uri;
        # Forward the demand headers carrying the TG-PCC + its DPoP proof.
        proxy_set_header        X-Tex-Credential  $http_x_tex_credential;
        proxy_set_header        X-Tex-DPoP        $http_x_tex_dpop;
    }

    # --- the protected resource ------------------------------------------- #
    location / {
        auth_request /_tex_auth;                    # 204 => allow; 401/403 => deny

        # Surface the deny reason to clients on failure (optional).
        auth_request_set $tex_deny $upstream_http_x_tex_deny_reason;
        error_page 401 = @deny401;
        error_page 403 = @deny403;

        proxy_pass http://protected_resource;
    }

    location @deny401 {
        default_type application/json;
        add_header   Cache-Control "no-store" always;
        return 401 '{"released":false,"reason":"$tex_deny","detail":"tex credential required"}';
    }
    location @deny403 {
        default_type application/json;
        add_header   Cache-Control "no-store" always;
        return 403 '{"released":false,"reason":"$tex_deny","detail":"tex credential rejected"}';
    }
}
