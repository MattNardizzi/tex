# tex-pep — the kernel-floor enforcement point, one pod per node.
#
# Container 1 (tex-kernel-pep): loads/attaches the cgroup/connect4 redirector,
#   warms the in-kernel verdict cache from the PDP, pins the orig-dst map.
# Container 2 (tex-proxy): the transparent enforcement proxy the redirect
#   targets; calls POST {PDP}/v1/govern/decide and obeys `released`.
#
# Both speak the fixed PDP contract. The PDP (Tex) runs as its own Service.
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: tex-pep
  namespace: tex-system
  labels: { app: tex-pep }
spec:
  selector:
    matchLabels: { app: tex-pep }
  template:
    metadata:
      labels: { app: tex-pep }
    spec:
      hostPID: true
      tolerations:
        - operator: Exists
      containers:
        - name: tex-kernel-pep
          image: ghcr.io/vortexblack/tex-kernel-pep:latest
          securityContext:
            privileged: true            # required: load eBPF, attach cgroup
            capabilities:
              add: ["SYS_ADMIN", "BPF", "NET_ADMIN", "PERFMON"]
          env:
            - { name: TEX_CGROUP,   valueFrom: { configMapKeyRef: { name: tex-pep-config, key: cgroup } } }
            - { name: TEX_PROXY_ADDR, value: "127.0.0.1:8088" }
            - { name: TEX_PDP_BASE, valueFrom: { configMapKeyRef: { name: tex-pep-config, key: pdpBase } } }
            - { name: TEX_PDP_API_KEY, valueFrom: { secretKeyRef: { name: tex-pep-secret, key: apiKey, optional: true } } }
          volumeMounts:
            - { name: bpffs,  mountPath: /sys/fs/bpf, mountPropagation: Bidirectional }
            - { name: cgroup, mountPath: /sys/fs/cgroup }
        - name: tex-proxy
          image: ghcr.io/vortexblack/tex:latest
          command: ["python", "-m", "tex.pep"]
          env:
            - { name: TEX_PDP_MODE, value: "http" }
            - { name: TEX_PDP_BASE, valueFrom: { configMapKeyRef: { name: tex-pep-config, key: pdpBase } } }
            - { name: TEX_PDP_API_KEY, valueFrom: { secretKeyRef: { name: tex-pep-secret, key: apiKey, optional: true } } }
            - { name: TEX_PEP_ENV, value: "production" }
            - { name: TEX_PEP_PORT, value: "8088" }
          ports:
            - { containerPort: 8088, name: proxy }
      volumes:
        - { name: bpffs,  hostPath: { path: /sys/fs/bpf, type: DirectoryOrCreate } }
        - { name: cgroup, hostPath: { path: /sys/fs/cgroup, type: Directory } }
