{{- if .Values.kernelFloor.enabled }}
# Sidecarless kernel floor: one pod per node, governs every workload incl. new
# ones, no injection. The agent loads the eBPF redirector; the proxy decides.
apiVersion: apps/v1
kind: DaemonSet
metadata: { name: tex-pep, namespace: {{ include "tex.namespace" . }} }
spec:
  selector: { matchLabels: { app: tex-pep } }
  template:
    metadata: { labels: { app: tex-pep } }
    spec:
      serviceAccountName: tex-pep
      hostPID: true
      tolerations: [ { operator: Exists } ]
      containers:
        - name: tex-kernel-pep
          image: {{ .Values.image.kernelPep }}
          securityContext:
            privileged: true
            capabilities: { add: ["SYS_ADMIN", "BPF", "NET_ADMIN", "PERFMON"] }
          env:
            - { name: TEX_PROXY_ADDR, value: "127.0.0.1:{{ .Values.kernelFloor.proxyPort }}" }
            - { name: TEX_PDP_BASE, value: "http://tex.{{ include "tex.namespace" . }}.svc.cluster.local:{{ .Values.pdp.port }}" }
          volumeMounts:
            - { name: bpffs,  mountPath: /sys/fs/bpf, mountPropagation: Bidirectional }
            - { name: cgroup, mountPath: /sys/fs/cgroup }
        - name: tex-proxy
          image: {{ .Values.image.proxy }}
          command: ["python", "-m", "tex.pep"]
          env:
            - { name: TEX_PDP_MODE, value: "http" }
            - { name: TEX_PDP_BASE, value: "http://tex.{{ include "tex.namespace" . }}.svc.cluster.local:{{ .Values.pdp.port }}" }
            - { name: TEX_PEP_PORT, value: "{{ .Values.kernelFloor.proxyPort }}" }
          ports: [ { containerPort: {{ .Values.kernelFloor.proxyPort }}, name: proxy } ]
      volumes:
        - { name: bpffs,  hostPath: { path: /sys/fs/bpf, type: DirectoryOrCreate } }
        - { name: cgroup, hostPath: { path: /sys/fs/cgroup, type: Directory } }
{{- end }}
