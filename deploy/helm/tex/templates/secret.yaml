{{- if .Values.apiKey }}
apiVersion: v1
kind: Secret
metadata: { name: tex-pep-secret, namespace: {{ include "tex.namespace" . }} }
type: Opaque
stringData: { apiKey: {{ .Values.apiKey | quote }} }
{{- end }}
{{- if or .Values.pdp.databaseUrl .Values.pdp.evidenceSummarySecret .Values.pdp.apiKeys }}
---
# PDP application secrets. Each key is referenced by the PDP Deployment only when
# its value is set (see templates/pdp.yaml). For real secret management, leave
# these empty in values and create the `tex-app-secret` out-of-band (sealed
# secrets / external-secrets / CSI) with the same keys.
apiVersion: v1
kind: Secret
metadata: { name: tex-app-secret, namespace: {{ include "tex.namespace" . }} }
type: Opaque
stringData:
  {{- if .Values.pdp.databaseUrl }}
  databaseUrl: {{ .Values.pdp.databaseUrl | quote }}
  {{- end }}
  {{- if .Values.pdp.evidenceSummarySecret }}
  evidenceSummarySecret: {{ .Values.pdp.evidenceSummarySecret | quote }}
  {{- end }}
  {{- if .Values.pdp.apiKeys }}
  apiKeys: {{ .Values.pdp.apiKeys | quote }}
  {{- end }}
{{- end }}
