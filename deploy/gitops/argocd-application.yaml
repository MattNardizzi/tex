# The first install, automatic: commit this and Argo CD installs Tex on the
# cluster and keeps it reconciled — self-healing, fleet-wide, and onto new
# clusters provisioned through the same GitOps repo. "Deploy" becomes "merge."
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tex
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/MattNardizzi/tex
    path: deploy/helm/tex
    targetRevision: main
    helm:
      values: |
        kernelFloor:
          enabled: true
  destination:
    server: https://kubernetes.default.svc
    namespace: tex-system
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [ CreateNamespace=true ]
